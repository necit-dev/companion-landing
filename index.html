<!doctype html>
<html lang="ru">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Попутчик</title>
	<link rel="preload" as="font" type="font/woff2" href="./fonts/BloggerSans/BloggerSans-Bold.woff2"
	      crossorigin>
	<link rel="preload" as="font" type="font/woff2" href="./fonts/BloggerSans/BloggerSans-Medium.woff2"
	      crossorigin>
	<link rel="preload" as="font" type="font/woff2" href="./fonts/BloggerSans/BloggerSans.woff2" crossorigin>
	<link rel="stylesheet" href="./css/style.css">
	<script src="./js/script.js" defer></script>
</head>
<body>

<svg style="display: none">
	<symbol id="like" viewBox="0 0 20 18">
		<path
		      d="M9.99243 6.87436L11.1091 4.52557C11.3864 3.94396 11.8673 3.10764 12.548 2.43149C13.2175 1.76585 14.0194 1.3129 14.9886 1.3129C17.0821 1.3129 18.7358 3.05381 18.7358 5.14658C18.7358 6.7365 18.0438 7.85903 16.4026 9.57106C15.9816 10.0096 15.502 10.4835 14.9712 11.0061C13.5872 12.3715 11.866 14.0704 9.99243 16.3417C8.11885 14.0704 6.39765 12.3715 5.0137 11.0061C4.48285 10.4835 4.00197 10.0083 3.58229 9.57106C1.94103 7.85903 1.24905 6.7365 1.24905 5.14658C1.24905 3.05381 2.9028 1.3129 4.99621 1.3129C5.96548 1.3129 6.76737 1.76585 7.43687 2.43149C8.1176 3.10764 8.59849 3.94396 8.87578 4.52557L9.99243 6.87436ZM10.4821 17.7609C10.4219 17.8358 10.3469 17.896 10.2624 17.9373C10.1778 17.9786 10.0857 18 9.99243 18C9.89918 18 9.80706 17.9786 9.72249 17.9373C9.63793 17.896 9.56295 17.8358 9.5028 17.7609C7.50307 15.2638 5.69319 13.4783 4.20307 12.0091C1.62377 9.4634 0 7.86297 0 5.14658C0 2.30414 2.23581 0 4.99621 0C6.9947 0 8.39239 1.37855 9.24799 2.63631C9.57275 3.11552 9.82006 3.57635 9.99243 3.93871C10.2085 3.48519 10.4574 3.04978 10.7369 2.63631C11.5925 1.37723 12.9902 0 14.9886 0C17.7491 0 19.9849 2.30414 19.9849 5.14658C19.9849 7.86297 18.3611 9.4634 15.7818 12.0091C14.2917 13.4796 12.4818 15.2651 10.4821 17.7596V17.7609Z" />
	</symbol>
</svg>


<div class="page-content container">
	<aside class="sidebar">
		<h1 class="sidebar__title">Подберите идеального попутчика</h1>
		<form class="sidebar__form form">
			<div class="form__scroll">
				<div class="form__content">
					<fieldset class="form__accordion" data-accordion="hobby">
						<legend>
							<button
								class="form__accordion-opener"
								type="button"
								aria-expanded="true">
								<span>Хобби</span>
								<img src="img/icons/arrow_expand.svg" alt="arrow">
							</button>
						</legend>
						<div class="form__accordion-content form__accordion-content--opened">
							<div class="form__accordion-block">
								<label class="form__checkbox">
									<input type="checkbox" class="form__real-checkbox" name="sport">
									<span class="form__custom-checkbox"></span>
									Спортзал
								</label>
								<label class="form__checkbox">
									<input type="checkbox" class="form__real-checkbox" name="calyan">
									<span class="form__custom-checkbox"></span>
									Кальян
								</label>
								<label class="form__checkbox">
									<input type="checkbox" class="form__real-checkbox" name="bed">
									<span class="form__custom-checkbox"></span>
									Диван
								</label>
							</div>

						</div>
					</fieldset>
					<fieldset class="form__accordion" data-accordion="music">
						<legend>
							<button
								class="form__accordion-opener"
								type="button"
								aria-expanded="true">
								<span>Музыка</span>
								<img src="img/icons/arrow_expand.svg" alt="arrow">
							</button>
						</legend>
						<div class="form__accordion-content form__accordion-content--opened">
							<div class="form__accordion-block">
								<label class="form__checkbox">
									<input type="checkbox" class="form__real-checkbox" name="hard_rock">
									<span class="form__custom-checkbox"></span>
									Тяжелый рок
								</label>
								<label class="form__checkbox">
									<input type="checkbox" class="form__real-checkbox" name="russian_rap">
									<span class="form__custom-checkbox"></span>
									Русский рэп
								</label>
								<label class="form__checkbox">
									<input type="checkbox" class="form__real-checkbox" name="euro_dance">
									<span class="form__custom-checkbox"></span>
									Евроденс
								</label>
							</div>

						</div>
					</fieldset>

				</div>
			</div>
			<button class="form__btn btn" type="button">Показать</button>
		</form>
	</aside>


	<main class="main">
		<section class="users">
			<article class="user" data-id="1">
				<img src="./img/users/firsova.jpg" alt="Таня Фирсова" class="user__photo">
				<div class="user__primary">
					<div class="user__status"></div>
					<h2 class="user__name" title="Таня Фирсова">Таня Фирсова</h2>
				</div>
				<div class="user__hashtags">
					<div class="user__hashtag">#ЗОЖ</div>
					<div class="user__hashtag">#ПП</div>
					<div class="user__hashtag">#Фитнес</div>
					<div class="user__hashtag">#пляж</div>
					<div class="user__hashtag">#авокадо</div>
					<div class="user__hashtag">#смузи</div>
				</div>
				<div class="user__countries">
					<div class="user__country">
						<img src="./img/countries/SriLanka.png" alt="Шри-Ланка" class="user__country-img">
						<div class="user__country-name">Шри-Ланка</div>
					</div>
					<div class="user__country">
						<img src="./img/countries/Thailand.png" alt="Таиланд" class="user__country-img">
						<div class="user__country-name">Таиланд</div>
					</div>
					<div class="user__country">
						<img src="./img/countries/Seychelles.png" alt="Сейшелы" class="user__country-img">
						<div class="user__country-name">Сейшелы</div>
					</div>

				</div>
				<button class="user__btn btn">Позвать!</button>
				<div class="user__like user__like--active">
					<button class="user__like-btn">
						<svg>
							<use xlink:href="#like"></use>
						</svg>
					</button>
					<div class="user__like-count">1,5 M</div>
				</div>
				<div class="user__transports">
					<div class="user__transport user__transport--active">
						<img src="./img/icons/icon_plane.svg" alt="Самолет" class="user__transport-plane">
					</div>
					<div class="user__transport">
						<img src="./img/icons/icon_bus.svg" alt="Автобус" class="user__transport-bus">
					</div>
					<div class="user__transport">
						<img src="./img/icons/icon_bicycle.svg" alt="Велосипед" class="user__transport-bike">
					</div>
					<div class="user__transport">
						<img src="./img/icons/icon_run.svg" alt="Бег" class="user__transport-run">
					</div>
				</div>
				<div class="user__level circle" style="--size: 64px; --thickness: 3px; --percent: 97; --color: #ff8d30">
					<svg>
						<circle class="circle__element" cx="50%" cy="50%" r="calc(50% - var(--thickness) / 2)"/>
					</svg>
					<div class="user__level-info">
						<div class="user__level-number">99</div>
						<div class="user__level-text">level</div>
					</div>
				</div>
			</article>
		</section>
	</main>
</div>


</body>
</html>
